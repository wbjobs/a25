version: '3.8'

services:
  redis-1:
    image: redis:7.0-alpine
    ports:
      - "7001:7001"
    command: redis-server --port 7001 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass redis123
    volumes:
      - redis-1-data:/data

  redis-2:
    image: redis:7.0-alpine
    ports:
      - "7002:7002"
    command: redis-server --port 7002 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass redis123
    volumes:
      - redis-2-data:/data

  redis-3:
    image: redis:7.0-alpine
    ports:
      - "7003:7003"
    command: redis-server --port 7003 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass redis123
    volumes:
      - redis-3-data:/data

  redis-4:
    image: redis:7.0-alpine
    ports:
      - "7004:7004"
    command: redis-server --port 7004 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass redis123
    volumes:
      - redis-4-data:/data

  redis-5:
    image: redis:7.0-alpine
    ports:
      - "7005:7005"
    command: redis-server --port 7005 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass redis123
    volumes:
      - redis-5-data:/data

  redis-6:
    image: redis:7.0-alpine
    ports:
      - "7006:7006"
    command: redis-server --port 7006 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass redis123
    volumes:
      - redis-6-data:/data

  redis-cluster-init:
    image: redis:7.0-alpine
    depends_on:
      - redis-1
      - redis-2
      - redis-3
      - redis-4
      - redis-5
      - redis-6
    command: >
      sh -c "echo 'yes' | redis-cli --cluster create
      redis-1:7001 redis-2:7002 redis-3:7003
      redis-4:7004 redis-5:7005 redis-6:7006
      --cluster-replicas 1 -a redis123"
    restart: "no"

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  envoy:
    image: envoyproxy/envoy:v1.28.0
    ports:
      - "8080:8080"
      - "9901:9901"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml
    depends_on:
      - game-server
      - match-server

  game-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.game
    ports:
      - "50051:50051"
    environment:
      - REDIS_ADDR=redis-1:7001
      - REDIS_PASSWORD=redis123
      - REDIS_USE_CLUSTER=true
      - REDIS_CLUSTER_ADDRS=redis-1:7001,redis-2:7002,redis-3:7003
      - MONGO_URI=mongodb://admin:password@mongodb:27017
    depends_on:
      - redis-1
      - redis-2
      - redis-3
      - redis-4
      - redis-5
      - redis-6
      - mongodb
    volumes:
      - ai-models:/app/models

  match-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.match
    ports:
      - "50052:50052"
    environment:
      - REDIS_ADDR=redis-1:7001
      - REDIS_PASSWORD=redis123
      - REDIS_USE_CLUSTER=true
      - REDIS_CLUSTER_ADDRS=redis-1:7001,redis-2:7002,redis-3:7003
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - GAME_SERVER_ADDR=game-server:50051
    depends_on:
      - redis-1
      - redis-2
      - redis-3
      - redis-4
      - redis-5
      - redis-6
      - mongodb
      - game-server

volumes:
  redis-1-data:
  redis-2-data:
  redis-3-data:
  redis-4-data:
  redis-5-data:
  redis-6-data:
  mongo-data:
  ai-models:
